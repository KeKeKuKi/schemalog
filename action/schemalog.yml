# Copy this file to your repo: .github/workflows/schemalog.yml
#
# Requires: SCHEMALOG_API_KEY secret set in repo Settings → Secrets

name: Database Changelog

on:
  pull_request:
    paths:
      - "migrations/**/*.sql"

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff against base branch

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install schemalog
        run: npm install -g schemalog@latest

      - name: Generate changelog
        run: |
          schemalog init --dir migrations --provider deepseek
          schemalog generate --provider deepseek
        env:
          SCHEMALOG_API_KEY: ${{ secrets.SCHEMALOG_API_KEY }}

      - name: Generate schema diff vs base branch
        run: |
          schemalog diff --base-ref "origin/${{ github.base_ref }}" 2>/dev/null || echo "Diff skipped (no base schema found)"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            let body = "## 📊 Database Migration Changelog\n\n";

            if (fs.existsSync("SCHEMA.md")) {
              body += fs.readFileSync("SCHEMA.md", "utf-8");
            }

            if (fs.existsSync("SCHEMA_DIFF.md")) {
              body += "\n---\n\n";
              body += fs.readFileSync("SCHEMA_DIFF.md", "utf-8");
            }

            body += "\n\n---\n*Generated by [Schemalog](https://github.com/KeKeKuKi/schemalog)*";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
