# Copy this file to your repo: .github/workflows/schemalog.yml
#
# Requires: SCHEMALOG_API_KEY secret set in repo Settings → Secrets

name: Database Changelog

on:
  pull_request:
    paths:
      - "migrations/**/*.sql"

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install schemalog
        run: npm install -g schemalog

      - name: Generate changelog
        run: |
          schemalog init --dir migrations --provider deepseek
          schemalog generate --provider deepseek
        env:
          SCHEMALOG_API_KEY: ${{ secrets.SCHEMALOG_API_KEY }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("SCHEMA.md")) return;

            const md = fs.readFileSync("SCHEMA.md", "utf-8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📊 Database Migration Changelog\n\n${md}`,
            });
